<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Code Editor Debug Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .test-area { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .log { background: #f5f5f5; padding: 10px; max-height: 300px; overflow-y: auto; }
        .log-entry { margin: 2px 0; }
        .log-entry.error { color: red; }
        .log-entry.success { color: green; }
        .log-entry.info { color: blue; }
    </style>
</head>
<body>
    <h1>Code Editor Event Test</h1>
    
    <div class="test-area">
        <h3>Test 1: ContentEditable with Input Event</h3>
        <div contenteditable="true" id="test1" style="border: 1px solid #999; padding: 5px; min-height: 50px;">
            Edit this text...
        </div>
    </div>
    
    <div class="test-area">
        <h3>Event Log:</h3>
        <div id="log" class="log"></div>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <script>
        const log = document.getElementById('log');
        const test1 = document.getElementById('test1');
        
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        function clearLog() {
            log.innerHTML = '';
        }
        
        // Test input event on contenteditable
        test1.addEventListener('input', (e) => {
            addLog('INPUT event fired on contenteditable', 'success');
            addLog(`  Content: "${e.target.textContent.substring(0, 50)}..."`);
        });
        
        test1.addEventListener('blur', (e) => {
            addLog('BLUR event fired on contenteditable', 'info');
        });
        
        test1.addEventListener('keydown', (e) => {
            addLog(`KEYDOWN event: key="${e.key}"`, 'info');
        });
        
        addLog('Event listeners attached. Start typing in the text area above.', 'success');
    </script>
</body>
</html>
