<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapse Functionality Test Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 0.5rem;
        }
        
        h2 {
            color: #34495e;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }
        
        .test-section {
            margin-bottom: 2rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            background: #f8f9fa;
        }
        
        .test-case {
            margin-bottom: 1rem;
            padding: 1rem;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #95a5a6;
        }
        
        .test-case.pass {
            border-left-color: #2ecc71;
            background: #f0fff4;
        }
        
        .test-case.fail {
            border-left-color: #e74c3c;
            background: #fff5f5;
        }
        
        .test-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }
        
        .test-result {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #555;
        }
        
        .test-input {
            background: #2c3e50;
            color: #2ecc71;
            padding: 0.5rem;
            border-radius: 4px;
            margin: 0.5rem 0;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        
        .test-expected {
            color: #27ae60;
            margin-top: 0.3rem;
        }
        
        .test-actual {
            color: #c0392b;
            margin-top: 0.3rem;
        }
        
        .summary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            font-size: 1.1rem;
        }
        
        .summary-item {
            text-align: center;
        }
        
        .summary-value {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .icon {
            margin-right: 0.5rem;
        }
        
        .pass-icon { color: #2ecc71; }
        .fail-icon { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Collapse Functionality Test Suite</h1>
        <div id="summary" class="summary"></div>
        <div id="test-results"></div>
    </div>

    <script>
        // Test framework
        const tests = {
            passed: 0,
            failed: 0,
            results: []
        };

        function assert(condition, testName, expected, actual, input = '') {
            const result = {
                name: testName,
                passed: condition,
                expected,
                actual,
                input
            };
            
            if (condition) {
                tests.passed++;
            } else {
                tests.failed++;
            }
            
            tests.results.push(result);
        }

        function assertEquals(actual, expected, testName, input = '') {
            assert(actual === expected, testName, expected, actual, input);
        }

        function assertTrue(condition, testName, input = '') {
            assert(condition, testName, 'true', String(condition), input);
        }

        // Copy functions from main application
        function parseJsonToLines(json) {
            const lines = [];
            const text = JSON.stringify(json, null, 2);
            const textLines = text.split('\n');
            
            textLines.forEach((line, index) => {
                const trimmed = line.trimStart();
                const indent = line.length - trimmed.length;
                
                const isObjectStart = trimmed.startsWith('{');
                const isArrayStart = trimmed.startsWith('[');
                const isObjectEnd = trimmed.startsWith('}');
                const isArrayEnd = trimmed.startsWith(']');
                
                const hasObjectValue = /["']\s*:\s*\{/.test(trimmed);
                const hasArrayValue = /["']\s*:\s*\[/.test(trimmed);
                
                const isCollapsible = ((isObjectStart || isArrayStart || hasObjectValue || hasArrayValue) && 
                                      index < textLines.length - 1);
                
                lines.push({
                    index,
                    text: line,
                    indent,
                    isObjectStart,
                    isArrayStart,
                    isObjectEnd,
                    isArrayEnd,
                    hasObjectValue,
                    hasArrayValue,
                    isCollapsible
                });
            });
            
            return lines;
        }

        function findMatchingBracket(lines, startIndex) {
            const startLine = lines[startIndex];
            const trimmed = startLine.text.trimStart();
            
            let isObject = false;
            if (trimmed.startsWith('{') || trimmed.includes(': {')) {
                isObject = true;
            }
            
            const openChar = isObject ? '{' : '[';
            const closeChar = isObject ? '}' : ']';
            
            let depth = 0;
            for (let i = startIndex; i < lines.length; i++) {
                const line = lines[i].text;
                for (let char of line) {
                    if (char === openChar) depth++;
                    if (char === closeChar) depth--;
                    if (depth === 0 && i > startIndex) return i;
                }
            }
            return startIndex;
        }

        function getCollapsedLabel(lines, startIndex, endIndex) {
            const startLine = lines[startIndex];
            const startText = startLine.text.trim();
            
            const propertyMatch = startText.match(/["']([^"']+)["']\s*:\s*[\{\[]/);
            if (propertyMatch) {
                return propertyMatch[1];
            }
            
            // Look for name property
            for (let i = startIndex + 1; i < Math.min(endIndex, startIndex + 10); i++) {
                const line = lines[i].text.trim();
                const nameMatch = line.match(/["']name["']\s*:\s*["']([^"']+)["']/i);
                if (nameMatch) {
                    return nameMatch[1];
                }
            }
            
            const lineCount = endIndex - startIndex;
            return `${lineCount} lines`;
        }

        // ============================================
        // TEST SUITE
        // ============================================

        console.log('🧪 Running Collapse Functionality Tests...\n');

        // Test 1: Detection of standalone brackets
        console.log('Test Category: Standalone Bracket Detection');
        {
            const testJson = { name: "test" };
            const lines = parseJsonToLines(testJson);
            
            // Line 0: {
            assertTrue(lines[0].isObjectStart, 'Detects opening brace', lines[0].text);
            assertTrue(lines[0].isCollapsible, 'Marks opening brace as collapsible', lines[0].text);
            
            // Line 2: }
            assertTrue(lines[2].isObjectEnd, 'Detects closing brace', lines[2].text);
        }

        // Test 2: Detection of property with object
        console.log('Test Category: Property with Object Detection');
        {
            const testJson = { trigger: { role: "User" } };
            const lines = parseJsonToLines(testJson);
            
            // Find "trigger": { line
            const triggerLine = lines.find(l => l.text.includes('"trigger"'));
            assertTrue(triggerLine.hasObjectValue, 'Detects "trigger": {', triggerLine.text);
            assertTrue(triggerLine.isCollapsible, 'Marks "trigger": { as collapsible', triggerLine.text);
        }

        // Test 3: Detection of property with array
        console.log('Test Category: Property with Array Detection');
        {
            const testJson = { properties: ["item1", "item2"] };
            const lines = parseJsonToLines(testJson);
            
            const propLine = lines.find(l => l.text.includes('"properties"'));
            assertTrue(propLine.hasArrayValue, 'Detects "properties": [', propLine.text);
            assertTrue(propLine.isCollapsible, 'Marks "properties": [ as collapsible', propLine.text);
        }

        // Test 4: Bracket matching for simple object
        console.log('Test Category: Bracket Matching - Simple');
        {
            const testJson = { name: "test", value: 123 };
            const lines = parseJsonToLines(testJson);
            
            const endIndex = findMatchingBracket(lines, 0);
            assertEquals(endIndex, lines.length - 1, 'Finds matching closing brace', '{...}');
        }

        // Test 5: Bracket matching for nested objects
        console.log('Test Category: Bracket Matching - Nested');
        {
            const testJson = {
                outer: {
                    inner: {
                        value: 1
                    }
                }
            };
            const lines = parseJsonToLines(testJson);
            
            const outerLine = lines.findIndex(l => l.text.includes('"outer"'));
            const endIndex = findMatchingBracket(lines, outerLine);
            const endLineText = lines[endIndex].text.trim();
            
            // Should find the closing brace of outer object
            assertTrue(endLineText.startsWith('}'), 'Finds correct closing brace for nested object', 'outer: {...}');
        }

        // Test 6: Bracket matching for property with object
        console.log('Test Category: Bracket Matching - Property Object');
        {
            const testJson = {
                command: {
                    name: "Add item",
                    properties: ["CartId", "Description"]
                }
            };
            const lines = parseJsonToLines(testJson);
            
            const commandLine = lines.findIndex(l => l.text.includes('"command"'));
            const endIndex = findMatchingBracket(lines, commandLine);
            
            assertTrue(endIndex > commandLine, 'Finds closing bracket after start', '"command": {...}');
            assertTrue(lines[endIndex].text.includes('}'), 'End line contains closing brace', lines[endIndex].text);
        }

        // Test 7: Label extraction - Property name
        console.log('Test Category: Label Extraction - Property Names');
        {
            const testJson = {
                trigger: { role: "User" },
                events: [{ name: "Created" }]
            };
            const lines = parseJsonToLines(testJson);
            
            const triggerLine = lines.findIndex(l => l.text.includes('"trigger"'));
            const triggerEnd = findMatchingBracket(lines, triggerLine);
            const label = getCollapsedLabel(lines, triggerLine, triggerEnd);
            
            assertEquals(label, 'trigger', 'Extracts "trigger" as label', '"trigger": {...}');
            
            const eventsLine = lines.findIndex(l => l.text.includes('"events"'));
            const eventsEnd = findMatchingBracket(lines, eventsLine);
            const label2 = getCollapsedLabel(lines, eventsLine, eventsEnd);
            
            assertEquals(label2, 'events', 'Extracts "events" as label', '"events": [...]');
        }

        // Test 8: Label extraction - Name property
        console.log('Test Category: Label Extraction - Name Property');
        {
            const testJson = {
                slices: [
                    { name: "Add item" },
                    { name: "Remove item" }
                ]
            };
            const lines = parseJsonToLines(testJson);
            
            // Find first slice object
            let sliceIndex = -1;
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].text.trim() === '{' && lines[i+1].text.includes('"name"')) {
                    sliceIndex = i;
                    break;
                }
            }
            
            if (sliceIndex !== -1) {
                const endIndex = findMatchingBracket(lines, sliceIndex);
                const label = getCollapsedLabel(lines, sliceIndex, endIndex);
                assertEquals(label, 'Add item', 'Extracts name "Add item" from inside object', '{ name: "Add item" }');
            }
        }

        // Test 9: Complex nested structure
        console.log('Test Category: Complex Nested Structure');
        {
            const testJson = {
                slices: [
                    {
                        name: "Add item",
                        trigger: { role: "User" },
                        command: {
                            name: "Add item",
                            events: [
                                { name: "Cart created" }
                            ]
                        }
                    }
                ]
            };
            const lines = parseJsonToLines(testJson);
            
            // Count collapsible lines
            const collapsibleCount = lines.filter(l => l.isCollapsible).length;
            assertTrue(collapsibleCount >= 6, `Has at least 6 collapsible structures (found ${collapsibleCount})`, 'complex nested JSON');
        }

        // Test 10: Empty objects and arrays
        console.log('Test Category: Edge Cases - Empty Structures');
        {
            const testJson = {
                empty_obj: {},
                empty_arr: [],
                normal: { value: 1 }
            };
            const lines = parseJsonToLines(testJson);
            
            // Empty structures on one line shouldn't be collapsible in practice,
            // but our current implementation might mark them - that's OK
            const normalLine = lines.find(l => l.text.includes('"normal"'));
            assertTrue(normalLine.isCollapsible || normalLine.hasObjectValue, 
                      'Normal object is collapsible', '"normal": {...}');
        }

        // Test 11: Real-world em.json structure simulation
        console.log('Test Category: Real-world Event Model Structure');
        {
            const testJson = {
                title: "Cart System",
                slices: [
                    {
                        id: "1",
                        name: "Add item",
                        trigger: {
                            role: "User",
                            type: "input-ui"
                        },
                        command: {
                            name: "Add item",
                            properties: [
                                { name: "CartId", type: "Guid" }
                            ],
                            events: [
                                { name: "Cart created" }
                            ]
                        },
                        tests: [
                            { name: "Test 1" }
                        ]
                    }
                ]
            };
            const lines = parseJsonToLines(testJson);
            
            // Verify all important structures are collapsible
            const slicesLine = lines.find(l => l.text.includes('"slices"'));
            assertTrue(slicesLine && slicesLine.isCollapsible, '"slices" array is collapsible');
            
            const triggerLine = lines.find(l => l.text.includes('"trigger"'));
            assertTrue(triggerLine && triggerLine.isCollapsible, '"trigger" object is collapsible');
            
            const commandLine = lines.find(l => l.text.includes('"command"'));
            assertTrue(commandLine && commandLine.isCollapsible, '"command" object is collapsible');
            
            const propertiesLine = lines.find(l => l.text.includes('"properties"'));
            assertTrue(propertiesLine && propertiesLine.isCollapsible, '"properties" array is collapsible');
            
            const eventsLine = lines.find(l => l.text.includes('"events"'));
            assertTrue(eventsLine && eventsLine.isCollapsible, '"events" array is collapsible');
            
            const testsLine = lines.find(l => l.text.includes('"tests"'));
            assertTrue(testsLine && testsLine.isCollapsible, '"tests" array is collapsible');
        }

        // Test 12: Regex pattern validation
        console.log('Test Category: Regex Pattern Validation');
        {
            const patterns = [
                { line: '  "trigger": {', shouldMatch: true, type: 'object' },
                { line: '  "properties": [', shouldMatch: true, type: 'array' },
                { line: '  "name": "value",', shouldMatch: false, type: 'none' },
                { line: '  {', shouldMatch: false, type: 'standalone' },
                { line: "  'single': {", shouldMatch: true, type: 'object' },
                { line: '  "nested" : {', shouldMatch: true, type: 'object' },
                { line: '  "arr":[', shouldMatch: true, type: 'array' }
            ];
            
            patterns.forEach((pattern, idx) => {
                const trimmed = pattern.line.trimStart();
                const hasObjectValue = /["']\s*:\s*\{/.test(trimmed);
                const hasArrayValue = /["']\s*:\s*\[/.test(trimmed);
                
                if (pattern.type === 'object') {
                    assertEquals(hasObjectValue, pattern.shouldMatch, 
                               `Pattern ${idx + 1}: Object value detection`, pattern.line);
                } else if (pattern.type === 'array') {
                    assertEquals(hasArrayValue, pattern.shouldMatch,
                               `Pattern ${idx + 1}: Array value detection`, pattern.line);
                }
            });
        }

        // ============================================
        // RENDER RESULTS
        // ============================================

        function renderResults() {
            const total = tests.passed + tests.failed;
            const percentage = total > 0 ? Math.round((tests.passed / total) * 100) : 0;
            
            // Summary
            const summaryHtml = `
                <div class="summary-item">
                    <div class="summary-value">${total}</div>
                    <div>Total Tests</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" style="color: #2ecc71;">${tests.passed}</div>
                    <div>Passed</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" style="color: #e74c3c;">${tests.failed}</div>
                    <div>Failed</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value">${percentage}%</div>
                    <div>Success Rate</div>
                </div>
            `;
            document.getElementById('summary').innerHTML = summaryHtml;
            
            // Group results by category (extracted from test names)
            const categories = {};
            tests.results.forEach(result => {
                const category = result.name.split(':')[0] || 'General';
                if (!categories[category]) {
                    categories[category] = [];
                }
                categories[category].push(result);
            });
            
            // Render each category
            let resultsHtml = '';
            Object.keys(categories).forEach(category => {
                resultsHtml += `<div class="test-section"><h2>${category}</h2>`;
                
                categories[category].forEach(result => {
                    const status = result.passed ? 'pass' : 'fail';
                    const icon = result.passed ? '✓' : '✗';
                    const iconClass = result.passed ? 'pass-icon' : 'fail-icon';
                    
                    resultsHtml += `
                        <div class="test-case ${status}">
                            <div class="test-name">
                                <span class="icon ${iconClass}">${icon}</span>
                                ${result.name}
                            </div>
                            ${result.input ? `<div class="test-input">Input: ${result.input}</div>` : ''}
                            <div class="test-result">
                                <div class="test-expected">Expected: ${result.expected}</div>
                                <div class="test-actual">Actual: ${result.actual}</div>
                            </div>
                        </div>
                    `;
                });
                
                resultsHtml += '</div>';
            });
            
            document.getElementById('test-results').innerHTML = resultsHtml;
            
            // Console summary
            console.log('\n' + '='.repeat(50));
            console.log('TEST SUMMARY');
            console.log('='.repeat(50));
            console.log(`Total Tests: ${total}`);
            console.log(`Passed: ${tests.passed} ✓`);
            console.log(`Failed: ${tests.failed} ✗`);
            console.log(`Success Rate: ${percentage}%`);
            console.log('='.repeat(50));
            
            if (tests.failed > 0) {
                console.log('\n❌ Some tests failed. See details above.');
            } else {
                console.log('\n✅ All tests passed!');
            }
        }

        // Run tests
        window.addEventListener('load', () => {
            renderResults();
        });
    </script>
</body>
</html>
